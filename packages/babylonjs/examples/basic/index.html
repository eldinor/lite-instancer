<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon.js Instancer</title>
    <style>
      html, body, #renderCanvas { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body { background: #07101d; color: white; font: 14px system-ui; }
      #panel { position: fixed; z-index: 1; top: 56px; left: 12px; width: min(440px, calc(100% - 48px)); padding: 14px; border: 1px solid #ffffff24; border-radius: 10px; background: #0a1220e8; box-shadow: 0 10px 30px #0008; }
      h1 { margin: 0 0 5px; font-size: 16px; }
      p { margin: 4px 0 10px; color: #aab9cd; }
      #stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px 0; }
      #stats span { padding: 7px; border-radius: 6px; background: #ffffff0d; }
      #controls { display: flex; flex-wrap: wrap; gap: 7px; }
      button, a { border: 1px solid #ffffff2b; border-radius: 5px; padding: 6px 9px; background: #162a45; color: white; cursor: pointer; text-decoration: none; }
      .back { position: fixed; z-index: 2; top: 12px; left: 12px; }
      button:disabled { cursor: default; opacity: .45; }
      #checks { margin-top: 10px; color: #8fa3bb; font-size: 12px; }
      #checks .pass { color: #65df99; }
    </style>
  </head>
  <body>
    <a class="back" href="../">← All examples</a>
    <div id="panel">
      <h1>Rigid mesh stable-ID example</h1>
      <p id="status">Click any cube to select it.</p>
      <div id="stats">
        <span>ID: <b id="selectedId">—</b></span>
        <span>Slot: <b id="selectedSlot">—</b></span>
        <span>Visible: <b id="selectedVisible">—</b></span>
        <span>Count: <b id="count">0</b></span>
        <span>Drawn: <b id="visibleCount">0</b></span>
        <span>Capacity: <b id="capacity">0</b></span>
      </div>
      <div id="controls">
        <button id="toggle" disabled>Hide selected</button>
        <button id="remove" disabled>Remove selected</button>
        <button id="add">Add one</button>
        <button id="grow">Force growth</button>
        <a href="./?webgpu=1">WebGPU</a>
      </div>
      <div id="checks">Checks: <span id="pickCheck">picking ○</span> · <span id="visibilityCheck">hide/show ○</span> · <span id="removeCheck">compaction ○</span> · <span id="growCheck">growth ○</span></div>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
